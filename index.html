<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PNG → ICO</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; width: 700px; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }

    /* LEFT */
    .left { padding: 36px 32px; border-right: 1px solid #ebebeb; }
    .left h1 { font-size: 1.1rem; font-weight: 700; margin: 0 0 4px; }
    .left p  { font-size: 0.78rem; color: #888; margin: 0 0 24px; }
    .drop { border: 2px dashed #d0d0d0; border-radius: 8px; padding: 36px 20px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; position: relative; }
    .drop:hover, .drop.over { border-color: #555; background: #fafafa; }
    .drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
    .drop span  { font-size: 0.8rem; color: #aaa; }
    .drop span b { color: #444; font-weight: 600; }
    .meta { margin-top: 18px; font-size: 0.78rem; color: #666; line-height: 1.6; min-height: 40px; }

    /* RIGHT */
    .right { padding: 36px 32px; display: flex; flex-direction: column; justify-content: space-between; }
    .preview-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: repeating-conic-gradient(#f0f0f0 0% 25%, #fafafa 0% 50%) 0 0 / 16px 16px; border-radius: 8px; min-height: 160px; margin-bottom: 20px; }
    .preview-wrap img { max-width: 100%; max-height: 160px; object-fit: contain; display: none; border-radius: 4px; }
    .preview-wrap .placeholder { font-size: 0.78rem; color: #ccc; }
    button { width: 100%; padding: 11px; background: #222; color: #fff; border: none; border-radius: 7px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background .15s; }
    button:hover:not(:disabled) { background: #000; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status { font-size: 0.76rem; color: #888; text-align: center; margin-top: 10px; min-height: 16px; }
  </style>
</head>
<body>
<div class="box">
  <div class="left">
    <h1>PNG → ICO</h1>
    <p>Converts without resampling. Exact resolution, browser-only.</p>
    <div class="drop" id="drop">
      <input type="file" id="file-input" accept="image/png" />
      <span class="drop-icon">📂</span>
      <span>Drop PNG here or <b>browse</b></span>
    </div>
    <div class="meta" id="meta"></div>
  </div>
  <div class="right">
    <div class="preview-wrap" id="preview-wrap">
      <img id="preview" alt="preview" />
      <span class="placeholder" id="placeholder">No image selected</span>
    </div>
    <div>
      <button id="btn" disabled>Convert &amp; Download</button>
      <p class="status" id="status"></p>
    </div>
  </div>
</div>

<script>
  const drop = document.getElementById('drop');
  const fileInput = document.getElementById('file-input');
  const meta = document.getElementById('meta');
  const preview = document.getElementById('preview');
  const placeholder = document.getElementById('placeholder');
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  let file = null, W = 0, H = 0;

  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('over'));
  drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); load(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => load(fileInput.files[0]));

  function load(f) {
    if (!f || !f.type.match(/image\/png/i)) { status.textContent = 'PNG files only.'; return; }
    file = f;
    const url = URL.createObjectURL(f);
    const img = new Image();
    img.onload = () => {
      W = img.naturalWidth; H = img.naturalHeight;
      preview.src = url; preview.style.display = 'block';
      placeholder.style.display = 'none';
      meta.innerHTML = `<b>${f.name}</b><br>${W} × ${H} px &nbsp;·&nbsp; ${(f.size/1024).toFixed(1)} KB`;
      btn.disabled = false; status.textContent = '';
    };
    img.src = url;
  }

  btn.addEventListener('click', async () => {
    status.textContent = 'Converting…'; btn.disabled = true;
    try {
      const bytes = await pngToIco(file, W, H);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([bytes], { type: 'image/x-icon' }));
      a.download = file.name.replace(/\.png$/i, '') + '.ico'; a.click();
      status.textContent = '✓ Downloaded';
    } catch(e) { status.textContent = 'Error: ' + e.message; }
    finally { btn.disabled = false; }
  });

  async function pngToIco(f, w, h) {
    const bmp = await createImageBitmap(f);
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const ctx = c.getContext('2d'); ctx.drawImage(bmp, 0, 0); bmp.close();
    const { data } = ctx.getImageData(0, 0, w, h);
    const px = new Uint8Array(w * h * 4);
    for (let r = 0; r < h; r++) for (let col = 0; col < w; col++) {
      const s = ((h-1-r)*w+col)*4, d = (r*w+col)*4;
      px[d]=data[s+2]; px[d+1]=data[s+1]; px[d+2]=data[s+0]; px[d+3]=data[s+3];
    }
    const mask = new Uint8Array(h * Math.ceil(w/32)*4);
    const bih = new DataView(new ArrayBuffer(40));
    bih.setUint32(0,40,1); bih.setInt32(4,w,1); bih.setInt32(8,h*2,1);
    bih.setUint16(12,1,1); bih.setUint16(14,32,1); bih.setUint32(20,px.length+mask.length,1);
    const imgSz = 40+px.length+mask.length;
    const ent = new DataView(new ArrayBuffer(16));
    ent.setUint8(0,w>=256?0:w); ent.setUint8(1,h>=256?0:h);
    ent.setUint16(4,1,1); ent.setUint16(6,32,1); ent.setUint32(8,imgSz,1); ent.setUint32(12,22,1);
    const dir = new DataView(new ArrayBuffer(6));
    dir.setUint16(2,1,1); dir.setUint16(4,1,1);
    const out = new Uint8Array(22+imgSz); let off = 0;
    const wr = v => { out.set(new Uint8Array(v.buffer),off); off+=v.buffer.byteLength; };
    wr(dir); wr(ent); wr(bih); out.set(px,off); off+=px.length; out.set(mask,off);
    return out;
  }
</script>
</body>
</html>
